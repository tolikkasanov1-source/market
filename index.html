            if (list.length === 0) {
                container.innerHTML =
                    `<div class="empty"><span>${lang.notFound}</span><p>${lang.notFoundText}</p><p style="font-size:13px;color:#bbb;">${lang.notFoundSub}</p></div>`;
                return;
            }
            container.innerHTML = list.map(item => {
                const safeName = item.name.replace(/'/g, "\\'");
                return `
                    <div class="card">
                        <div class="card-image">${item.emoji}</div>
                        <div class="card-info">
                            <h3>${item.name}</h3>
                            <div class="price-row">
                                <div class="price">${lang.nftLabel}</div>
                                <button class="btn" onclick="openPayment('${safeName}')">${lang.rentAction}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterGifts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            giftsFiltered = gifts.filter(item => item.name.toLowerCase().includes(query));
            renderGifts(giftsFiltered);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
            if (tab === 'rent') {
                document.querySelector('.tabs button:first-child').classList.add('active');
            } else {
                document.querySelector('.tabs button:last-child').classList.add('active');
            }
            document.getElementById('searchInput').value = '';
            giftsFiltered = gifts;
            renderGifts(gifts);
        }

        // ====== МОДАЛКА ОПЛАТЫ ======
        function openPayment(item) {
            currentItem = item;
            const lang = langData[currentLang];
            // Устанавливаем сумму (можно сделать выбор, но для простоты пусть будет 500)
            selectedAmount = 500;
            document.getElementById('paymentAmount').textContent = selectedAmount + ' ₽';
            document.getElementById('cardDisplay').textContent = CARD_NUMBER;
            document.getElementById('paymentModal').style.display = 'flex';
            startTimer(600);
        }

        function closePayment() {
            document.getElementById('paymentModal').style.display = 'none';
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert('⏰ Время вышло. Повторите попытку.');
                    closePayment();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById('timerDisplay').textContent =
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        // ====== ПЕРЕХОД К ФОРМЕ ПОЛЬЗОВАТЕЛЯ ======
        function openUserForm() {
            if (timerSeconds <= 0) {
                alert('⏰ Время вышло. Повторите попытку.');
                return;
            }
            closePayment();
            document.getElementById('userModal').style.display = 'flex';
        }

        function closeUserForm() {
            document.getElementById('userModal').style.display = 'none';
            document.getElementById('telegramInput').value = '';
            document.getElementById('tonWallet').value = '';
        }

        // ====== ОТПРАВКА ЗАЯВКИ ======
        function sendOrder() {
            const username = document.getElementById('telegramInput').value.trim();
            const tonWallet = document.getElementById('tonWallet').value.trim();

            if (!username || !username.startsWith('@')) {
                alert(currentLang === 'ru' ? 'Введите @username' : 'Enter @username');
                return;
            }

            const text =
                `🎁 НОВАЯ ЗАЯВКА НА АРЕНДУ!\n\n` +
                `🎁 Подарок: ${currentItem}\n` +
                `💰 Сумма оплаты: ${selectedAmount} ₽\n` +
                `👤 Username: ${username}\n` +
                `💳 TON-кошелёк: ${tonWallet || 'Не указан'}\n` +
                `⏱ Время: ${new Date().toLocaleString()}\n\n` +
                `✅ Проверьте оплату на карте: ${CARD_NUMBER}\n` +
                `📢 Канал: https://t.me/helphunt`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: YOUR_CHAT_ID, text: text, parse_mode: 'HTML' })
            })
            .then(() => {
                alert(currentLang === 'ru' ? '✅ Заявка отправлена! Менеджер свяжется с вами.' : '✅ Request sent! Manager will contact you.');
                closeUserForm();
            })
            .catch((error) => {
                alert(currentLang === 'ru' ? '❌ Ошибка. Попробуйте ещё раз.' : '❌ Error. Please try again.');
            });
        }

        window.onclick = function(event) {
            const payment = document.getElementById('paymentModal');
            const user = document.getElementById('userModal');
            if (event.target === payment) closePayment();
            if (event.target === user) closeUserForm();
        }

        renderGifts(gifts);
    </script>
</body>
</html>
