<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuntGift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1a1a1a;
            padding: 16px 12px 80px;
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
        }
        /* ШАПКА */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: 4px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-switch {
            background: #e5e5ea;
            border-radius: 20px;
            padding: 3px;
            display: flex;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
        }
        .lang-switch button {
            background: transparent;
            border: none;
            color: #888;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-switch button.active {
            background: #007aff;
            color: #fff;
        }
        .lang-switch button:active {
            transform: scale(0.92);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header h1 .hunt {
            color: #1a1a1a;
        }
        .header h1 .gift {
            color: #e63946;
        }
        .header h1 .online {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #34c759;
            border-radius: 50%;
            margin-left: 2px;
            flex-shrink: 0;
            border: 2px solid #f5f5f7;
            box-shadow: 0 0 0 1px #34c759;
        }
        .counter {
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
            background: #e5e5ea;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 4px;
            min-width: 28px;
            text-align: center;
        }
        .header .balance {
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #e5e5ea;
        }
        .header .balance:active {
            transform: scale(0.95);
        }

        /* ПОИСК */
        .search {
            margin-bottom: 16px;
            position: relative;
        }
        .search .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            pointer-events: none;
        }
        .search input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            background: #ffffff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            color: #1a1a1a;
        }
        .search input::placeholder {
            color: #999;
        }
        .search input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
        }
        .tabs button {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            color: #888;
        }
        .tabs button.active {
            background: #007aff;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,122,255,0.2);
        }
        .tabs button:active {
            transform: scale(0.96);
        }

        /* СЕТКА 2 В РЯД */
        .gift-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e5e5ea;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card:active {
            transform: scale(0.96);
        }

        .card-image {
            width: 64px;
            height: 64px;
            background: #f0f0f3;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 1px solid #e5e5ea;
            margin-bottom: 6px;
        }

        .card-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .card-info .price-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .card-info .price {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .btn {
            padding: 4px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            background: #007aff;
            color: #fff;
        }
        .btn:active {
            transform: scale(0.94);
        }

        /* ПУСТО */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
            grid-column: 1 / -1;
        }
        .empty span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        /* МОДАЛКА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 999;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            padding: 28px 24px 24px;
            width: 100%;
            max-width: 360px;
            position: relative;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            position: absolute;
            right: 16px;
            top: 12px;
            font-size: 22px;
            cursor: pointer;
        }
        .modal-content h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .modal-content .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .modal-content input:focus {
            border-color: #007aff;
        }
        .modal-content .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 12px;
        }
        .modal-content .hint {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            max-width: 420px;
            margin: 0 auto;
        }
        .bottom-nav button {
            background: none;
            border: none;
            color: #888;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .bottom-nav button.active {
            color: #007aff;
        }
        .bottom-nav button span {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="lang-switch" id="langSwitch">
                <button class="active" data-lang="ru" onclick="setLang('ru')">RU</button>
                <button data-lang="en" onclick="setLang('en')">EN</button>
            </div>
            <h1>
                <span class="hunt">Hunt</span><span class="gift">Gift</span>
                <span class="online"></span>
                <span class="counter" id="onlineCounter">17</span>
            </h1>
        </div>
        <div class="balance" onclick="buyStars()">
            ⭐ <span id="starDisplay">0</span>
        </div>
    </div>

    <div class="search">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск NFT по названию" oninput="filterGifts()">
    </div>

    <div class="tabs">
        <button class="active" id="tabRent" onclick="switchTab('rent')">Аренда</button>
        <button id="tabBuy" onclick="switchTab('buy')">Покупка</button>
    </div>

    <div class="gift-grid" id="giftList"></div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 id="modalTitle">🔒 Аренда</h2>
            <div class="subtitle" id="modalDesc">Gift: Snoop Dogg</div>
            <input type="text" id="telegramInput" placeholder="@username">
            <button class="btn" id="modalBtn" onclick="sendOrder()">📩 Отправить заявку</button>
            <div class="hint" id="modalHint">Менеджер свяжется в течение 10 минут</div>
        </div>
    </div>

    <script>
        // ====== ЯЗЫКИ ======
        const langData = {

                rent: "Аренда",
                buy: "Покупка",
                rentTitle: "🔒 Аренда",

                buyEmpty: "🛒",
                buyText: "Покупка пока недоступна",
                buySub: "Скоро здесь появятся NFT для покупки",
                notFound: "🔍",

            },
            en: {
                search: "Search NFT by name",
                rent: "Rent",
                buy: "Buy",
                rentTitle: "🔒 Rent",
                rentDesc: "Gift: ",
                rentPlaceholder: "@username",
                rentBtn: "📩 Send request",
                rentHint: "Manager will contact you within 10 minutes",
                buyEmpty: "🛒",
                buyText: "Purchase is not available yet",
                buySub: "NFTs for purchase will appear here soon",
                notFound: "🔍",
                notFoundText: "Nothing found",
                notFoundSub: "Try changing your search query",
                nftLabel: "⭐ NFT",
                rentAction: "Rent",
                starsAlert: "⭐ Balance top-up\n\nSend 50+ stars to bot @huntgift_bot\n\nAfter crediting, write to @huntgift_support"
            }
        };

        let currentLang = 'ru';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-switch button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-switch button[data-lang="${lang}"]`).classList.add('active');

            const data = langData[lang];
            document.getElementById('searchInput').placeholder = data.search;
            document.getElementById('tabRent').textContent = data.rent;
            document.getElementById('tabBuy').textContent = data.buy;
            document.getElementById('modalTitle').textContent = data.rentTitle;
            document.getElementById('modalDesc').textContent = data.rentDesc + currentItem;
            document.getElementById('telegramInput').placeholder = data.rentPlaceholder;
            document.getElementById('modalBtn').textContent = data.rentBtn;
            document.getElementById('modalHint').textContent = data.rentHint;
            renderGifts(giftsFiltered || gifts);
        }

        // ====== ОНЛАЙН-СЧЁТЧИК ======
        const numbers = [17, 12, 26, 9, 11, 31, 6, 2, 15, 20, 21, 14, 17, 14, 15, 19];
        let index = 0;
        function updateOnlineCounter() {
            const el = document.getElementById('onlineCounter');
            if (el) { el.textContent = numbers[index]; index = (index + 1) % numbers.length; }
        }
        updateOnlineCounter();
        setInterval(updateOnlineCounter, 1800000);

        // ====== СПИСОК ПОДАРКОВ ======

            { name: "Snoop Dogg", emoji: "🐕" },

            { name: "Love Candle", emoji: "🕯️" },
            { name: "Heroic Helmet", emoji: "🪖" },
            { name: "Mighty Arm", emoji: "💪" },
            { name: "Ion Gem", emoji: "💎" },
            { name: "Nail Bracelet", emoji: "📿" },
            { name: "Mad Pumpkin", emoji: "🎃" },
            { name: "Low Rider", emoji: "🚗" },
            { name: "Flying Broom", emoji: "🧹" },
            { name: "Trapped Heart", emoji: "💔" },
            { name: "Crystal Ball", emoji: "🔮" },
            { name: "Sleigh Bell", emoji: "🔔" },
            { name: "Swiss Watch", emoji: "⌚" },
            { name: "Vintage Cigar", emoji: "🚬" },
            { name: "Top Hat", emoji: "🎩" },
            { name: "Record Player", emoji: "🎵" },
            { name: "Snow Mittens", emoji: "🧤" },
            { name: "Toy Bear", emoji: "🧸" },
            { name: "Hanging Star", emoji: "⭐" },

            { name: "Sharp Tongue", emoji: "👅" },
            { name: "Electric Skull", emoji: "⚡" },
            { name: "Westside Sign", emoji: "🤙" },
            { name: "Loot Bag", emoji: "💰" }
        ];

        let currentTab = 'rent';
        let currentItem = 'Snoop Dogg';
        let giftsFiltered = gifts;

        function renderGifts(list) {
            const container = document.getElementById('giftList');
            const lang = langData[currentLang];
            if (currentTab === 'buy') {
                container.innerHTML = `
                    <div class="empty">
                        <span>${lang.buyEmpty}</span>
                        <p>${lang.buyText}</p>
                        <p style="font-size: 13px; color: #bbb;">${lang.buySub}</p>
                    </div>
                `;
                return;
            }
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <span>${lang.notFound}</span>
                        <p>${lang.notFoundText}</p>
                        <p style="font-size: 13px; color: #bbb;">${lang.notFoundSub}</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = list.map(item => {
                const safeName = item.name.replace(/'/g, "\\'");
                return `
                    <div class="card">
                        <div class="card-image">${item.emoji}</div>
                        <div class="card-info">
                            <h3>${item.name}</h3>
                            <div class="price-row">
                                <div class="price">${lang.nftLabel}</div>
                                <button class="btn" onclick="openOrder('${safeName}')">${lang.rentAction}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterGifts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            giftsFiltered = gifts.filter(item => item.name.toLowerCase().includes(query));
            renderGifts(giftsFiltered);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
            if (tab === 'rent') {
                document.querySelector('.tabs button:first-child').classList.add('active');
            } else {
                document.querySelector('.tabs button:last-child').classList.add('active');
            }
            document.getElementById('searchInput').value = '';
            giftsFiltered = gifts;
            renderGifts(gifts);
        }

        // ====== МОДАЛКА ======
        function openOrder(item) {
            currentItem = item;
            const lang = langData[currentLang];
            document.getElementById('modalDesc').textContent = lang.rentDesc + item;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendOrder() {
            const username = document.getElementById('telegramInput').value.trim();
            if (!username || !username.startsWith('@')) {
                alert(currentLang === 'ru' ? 'Введите @username' : 'Enter @username');
                return;
            }

            // ⚠️ ВСТАВЬ НОВЫЙ ТОКЕН ПОСЛЕ СБРОСА ⚠️
            const BOT_TOKEN = '8969969111:AAE7XHZ2I-8UUlQf3Itd-ZYGjR6VhXCGs0M';
            const YOUR_CHAT_ID = '5885231089';

            const text = `🆕 NEW RENT REQUEST!\n\n🎁 Gift: ${currentItem}\n👤 Username: ${username}\n⏱ Time: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: YOUR_CHAT_ID, text: text, parse_mode: 'HTML' })
            })
            .then(() => {
                alert(currentLang === 'ru' ? '✅ Заявка отправлена! Менеджер свяжется в течение 10 минут.' : '✅ Request sent! Manager will contact you within 10 minutes.');
                closeModal();
                document.getElementById('telegramInput').value = '';
            })
            .catch(() => {
                alert(currentLang === 'ru' ? '❌ Ошибка. Попробуйте ещё раз.' : '❌ Error. Please try again.');
            });
        }

        function buyStars() {
            const lang = langData[currentLang];
            alert(lang.starsAlert);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) closeModal();
        }

        renderGifts(gifts);
    </script>
</body>
</html>
