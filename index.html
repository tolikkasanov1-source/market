<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e10;
            color: #ffffff;
            padding: 16px 12px 30px;
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f5a623;
            letter-spacing: 0.5px;
        }
        .header h1 span {
            color: #fff;
            font-weight: 300;
        }
        .header .balance {
            background: #2a2a2e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #aaa;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #2a2a2e;
        }
        .header .balance:hover {
            background: #3a3a3e;
            border-color: #f5a623;
        }
        .header .balance:active {
            transform: scale(0.95);
        }
        .card {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            transition: transform 0.2s;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card-image {
            width: 100%;
            height: 140px;
            background: #2a2a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card .sub {
            color: #888;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .card .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .card .price {
            color: #f5a623;
            font-weight: 700;
            font-size: 16px;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-primary {
            background: #f5a623;
            color: #0e0e10;
        }
        .btn-secondary {
            background: #2d2d32;
            color: #fff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 999;
        }
        .modal-content {
            background: #1a1a1e;
            border-radius: 24px;
            padding: 28px 24px 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid #2d2d32;
            position: relative;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            position: absolute;
            right: 16px;
            top: 12px;
            font-size: 22px;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #fff;
        }
        .modal-content h2 {
            margin-bottom: 6px;
            font-size: 20px;
            color: #f5a623;
        }
        .modal-content .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #2d2d32;
            background: #121214;
            color: #fff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .modal-content input::placeholder {
            color: #555;
        }
        .modal-content .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
        }
        .modal-content .hint {
            color: #555;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎁 <span>MARKET</span></h1>
        <div class="balance" onclick="buyStars()">
            ⭐ <span id="starDisplay">0</span>
        </div>
    </div>

    <div class="card">
        <div class="card-image">🎤</div>
        <h3>Snoop Dogg</h3>
        <div class="sub">NFT-подарок</div>
        <div class="price-row">
            <div class="price">⭐ NFT</div>
            <button class="btn btn-primary" onclick="openOrder('Snoop Dogg')">Арендовать</button>
        </div>
    </div>

    <div class="card">
        <div class="card-image">🦋</div>
        <h3>Бабочка</h3>
        <div class="sub">NFT-подарок</div>
        <div class="price-row">
            <div class="price">⭐ NFT</div>
            <button class="btn btn-primary" onclick="openOrder('Бабочка')">Арендовать</button>
        </div>
    </div>

    <div class="card">
        <div class="card-image">💍</div>
        <h3>Кольцо</h3>
        <div class="sub">NFT-подарок</div>
        <div class="price-row">
            <div class="price">⭐ NFT</div>
            <button class="btn btn-primary" onclick="openOrder('Кольцо')">Арендовать</button>
        </div>
    </div>

    <div class="card">
        <div class="card-image">🐱</div>
        <h3>Магический кот</h3>
        <div class="sub">NFT-подарок</div>
        <div class="price-row">
            <div class="price">⭐ NFT</div>
            <button class="btn btn-primary" onclick="openOrder('Магический кот')">Арендовать</button>
        </div>
    </div>

    <!-- МОДАЛКА АРЕНДЫ -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2>🔒 Rent / Аренда</h2>
            <div class="subtitle" id="modalDesc">Gift: Snoop Dogg</div>
            <input type="text" id="telegramInput" placeholder="@username">
            <button class="btn btn-primary" onclick="sendOrder()">📩 Send / Отправить</button>
            <div class="hint">Manager will contact you within 10 minutes / Менеджер свяжется в течение 10 минут</div>
        </div>
    </div>

    <script>
        let currentItem = '';

        function openOrder(item) {
            currentItem = item;
            document.getElementById('modalDesc').innerText = `Gift / Подарок: ${item}`;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendOrder() {
            const username = document.getElementById('telegramInput').value.trim();
            if (!username || !username.startsWith('@')) {
                alert('Please enter @username / Введите @username');
                return;
            }

            // ЗАМЕНИ НА СВОИ ДАННЫЕ
            const BOT_TOKEN = 'ТВОЙ_ТОКЕН_БОТА';
            const YOUR_CHAT_ID = 'ТВОЙ_TELEGRAM_ID';

            const text = `🆕 NEW RENT REQUEST!\n\n🎁 Gift: ${currentItem}\n👤 Username: ${username}\n⏱ Time: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: YOUR_CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            })
            .then(() => {
                alert('✅ Request sent! / Заявка отправлена!');
                closeModal();
                document.getElementById('telegramInput').value = '';
            })
            .catch(() => {
                alert('❌ Error. Please try again / Ошибка. Попробуйте ещё раз.');
            });
        }

        function buyStars() {
            alert('⭐ Пополнение баланса\n\nОтправьте 50+ звёзд боту @huntgift_bot\n\nПосле зачисления напишите @huntgift_support');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) closeModal();
        }

        document.getElementById('starDisplay').textContent = '0';
    </script>
</body>
</html>
